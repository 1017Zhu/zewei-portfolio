<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<a href="Project.dc.html?id={{ slug }}" style="cursor:pointer;text-decoration:none;color:inherit;display:block">
  <div style="position:relative;overflow:hidden;border-radius:6px;background:#141413">
    <image-slot id="{{ slotId }}" style="width:100%;height:auto;aspect-ratio:{{ ratio }};transition:transform 1s cubic-bezier(.2,.7,.2,1)" style-hover="transform:scale(1.04)" shape="rect" placeholder="{{ placeholder }}"></image-slot>
    <div style="position:absolute;left:18px;top:18px;right:18px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none">
      <div style="background:rgba(11,11,10,.55);backdrop-filter:blur(8px);border:1px solid rgba(216,255,62,.35);border-radius:6px;padding:12px 16px">
        <div style="font-size:{{ metricSize }};font-weight:300;letter-spacing:-.02em;line-height:1;color:#d8ff3e">{{ metric }}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.05em;color:#cfcec4;margin-top:6px">{{ metricLabel }}</div>
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#cfcec4;background:rgba(11,11,10,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14);border-radius:100px;padding:7px 13px">{{ en }}</span>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:baseline;gap:16px;margin-top:18px;border-top:1px solid rgba(255,255,255,.1);padding-top:16px">
    <div style="display:flex;align-items:baseline;gap:16px">
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#d8ff3e">{{ num }}</span>
      <div>
        <div style="font-size:{{ titleSize }};font-weight:300;letter-spacing:-.01em;line-height:1.1">{{ title }}</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#9a998f;margin-top:6px">{{ tags }}</div>
      </div>
    </div>
    <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#9a998f">{{ year }}</span>
  </div>
</a>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:460},&quot;project&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;{num:string,title:string,en:string,year:string,tags:string,slotId:string,metric:string,metricLabel:string}&quot;},&quot;featured&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props.project || {};
    const featured = !!this.props.featured;
    return {
      slotId: p.slotId,
      slug: p.slug || p.slotId,
      num: p.num,
      title: p.title,
      en: p.en,
      tags: p.tags,
      year: p.year,
      metric: p.metric,
      metricLabel: p.metricLabel,
      placeholder: featured ? "Drop project image here" : "Drop project image here",
      titleSize: featured ? "clamp(30px,3.4vw,46px)" : "clamp(22px,2.4vw,30px)",
      metricSize: featured ? "clamp(40px,5vw,64px)" : "clamp(30px,3.4vw,40px)",
      ratio: featured ? "16 / 9" : "4 / 5",
    };
  }
}
</script>
</body>
</html>
